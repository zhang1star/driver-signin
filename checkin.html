<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>司机签到</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <span class="logo">✅</span>
  <h1>司机签到</h1>
  <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
</div>

<!-- 加载遮罩 -->
<div class="loading-mask hidden" id="loadingMask">
  <div class="spinner"></div>
  <span>提交中…</span>
</div>

<div class="container fade-in">
  <!-- 表单 -->
  <div class="card" id="formCard">
    <div class="banner banner-info" style="margin-bottom:18px">
      ℹ️ 请如实填写以下信息，提交后将记录到场时间。
    </div>

    <div class="form-group">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="请输入真实姓名" maxlength="20">
      <span class="err-msg" id="nameErr">请输入姓名</span>
    </div>

    <div class="form-group">
      <label>车牌号 <span class="req">*</span></label>
      <input type="text" id="plate" placeholder="例：京A12345" maxlength="10"
             oninput="this.value=this.value.toUpperCase()">
      <span class="err-msg" id="plateErr">请输入正确的车牌号（至少5位）</span>
    </div>

    <div class="form-group">
      <label>手机号 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11" inputmode="numeric">
      <span class="err-msg" id="phoneErr">请输入正确的手机号</span>
    </div>

    <div class="form-group">
      <label>所属公司 <span class="req">*</span></label>
      <select id="company">
        <option value="">— 请选择 —</option>
        <option value="中通">中通</option>
        <option value="月祥">月祥</option>
        <option value="自有">自有</option>
        <option value="货拉拉">货拉拉</option>
      </select>
      <span class="err-msg" id="companyErr">请选择所属公司</span>
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" id="submitBtn" onclick="doCheckIn()">✅ 确认签到</button>
  </div>

  <!-- 成功 -->
  <div class="card hidden" id="successCard">
    <div class="success-wrap">
      <div class="big-icon pop">✅</div>
      <h2>签到成功！</h2>
      <p>到场时间已记录</p>
    </div>
    <table class="info-table">
      <tr><td>姓名</td><td id="s_name"></td></tr>
      <tr><td>车牌号</td><td id="s_plate"></td></tr>
      <tr><td>手机号</td><td id="s_phone"></td></tr>
      <tr><td>所属公司</td><td id="s_company"></td></tr>
      <tr><td>签到时间</td><td id="s_time"></td></tr>
    </table>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-outline" onclick="resetForm()">继续签到（下一位）</button>
      <button class="btn btn-primary" onclick="location.href='index.html'">返回首页</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  function validate() {
    let ok = true;
    const fields = ['name','plate','phone','company'];
    fields.forEach(f => {
      document.getElementById(f).classList.remove('error');
    });
    document.querySelectorAll('.err-msg').forEach(e => e.classList.remove('show'));

    if (!document.getElementById('name').value.trim()) {
      document.getElementById('name').classList.add('error');
      document.getElementById('nameErr').classList.add('show');
      ok = false;
    }
    const plate = document.getElementById('plate').value.trim();
    if (plate.length < 5) {
      document.getElementById('plate').classList.add('error');
      document.getElementById('plateErr').classList.add('show');
      ok = false;
    }
    if (!/^1[3-9]\d{9}$/.test(document.getElementById('phone').value.trim())) {
      document.getElementById('phone').classList.add('error');
      document.getElementById('phoneErr').classList.add('show');
      ok = false;
    }
    if (!document.getElementById('company').value) {
      document.getElementById('company').classList.add('error');
      document.getElementById('companyErr').classList.add('show');
      ok = false;
    }
    return ok;
  }

  async function doCheckIn() {
    if (!validate()) return;
    document.getElementById('loadingMask').classList.remove('hidden');
    document.getElementById('submitBtn').disabled = true;
    try {
      const record = await API.checkIn({
        name:    document.getElementById('name').value,
        plate:   document.getElementById('plate').value,
        phone:   document.getElementById('phone').value,
        company: document.getElementById('company').value,
      });
      document.getElementById('formCard').classList.add('hidden');
      const sc = document.getElementById('successCard');
      sc.classList.remove('hidden');
      sc.classList.add('fade-in');
      document.getElementById('s_name').textContent    = record.name;
      document.getElementById('s_plate').textContent   = record.plate;
      document.getElementById('s_phone').textContent   = record.phone;
      document.getElementById('s_company').textContent = record.company;
      document.getElementById('s_time').textContent    = fmtTime(record.in_time);
    } catch(e) {
      alert('提交失败，请检查网络后重试：' + e.message);
      document.getElementById('submitBtn').disabled = false;
    } finally {
      document.getElementById('loadingMask').classList.add('hidden');
    }
  }

  function resetForm() {
    ['name','plate','phone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('company').value = '';
    document.getElementById('successCard').classList.add('hidden');
    document.getElementById('formCard').classList.remove('hidden');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('name').focus();
  }
</script>
</body>
</html>
