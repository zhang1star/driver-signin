<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>司机签到系统</title>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-d:#1d4ed8;
  --success:#16a34a;--success-d:#15803d;
  --danger:#dc2626;--warn:#d97706;
  --bg:#f0f4ff;--card:#fff;--text:#1e293b;
  --muted:#64748b;--border:#e2e8f0;
  --radius:14px;--shadow:0 4px 24px rgba(37,99,235,.10);
}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* topbar */
.topbar{width:100%;background:var(--primary);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar .logo{font-size:22px}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.topbar .back-btn{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px}
.topbar .back-btn:hover{background:rgba(255,255,255,.35)}

/* container */
.container{width:100%;max-width:480px;padding:24px 16px 40px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px}

/* form */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-group:last-child{margin-bottom:0}
label{font-size:14px;font-weight:600}
label .req{color:var(--danger);margin-left:2px}
input,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#f8fafc;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
input.error,select.error{border-color:var(--danger)}
.err-msg{font-size:12px;color:var(--danger);display:none}
.err-msg.show{display:block}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:var(--success-d)}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:#eff6ff}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* home big buttons */
.home-btn-wrap{display:flex;flex-direction:column;gap:16px;margin-top:8px}
.home-big-btn{display:flex;align-items:center;gap:18px;padding:22px 20px;border-radius:var(--radius);cursor:pointer;border:none;width:100%;text-align:left;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}
.home-big-btn:active{transform:scale(.97)}
.home-big-btn .icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;background:rgba(255,255,255,.2)}
.home-big-btn .info h2{font-size:18px;font-weight:700}
.home-big-btn .info p{font-size:13px;margin-top:3px;opacity:.75}
.btn-checkin{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff}
.btn-checkout{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.btn-admin{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}

/* banner */
.banner{border-radius:10px;padding:12px 16px;font-size:14px;display:flex;align-items:flex-start;gap:8px}
.banner-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.banner-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.banner-warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}

/* plate list */
.search-wrap{position:relative}
.search-wrap input{padding-left:40px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
.plate-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;max-height:340px;overflow-y:auto}
.plate-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s,background .2s;background:#f8fafc}
.plate-item:hover{border-color:var(--success);background:#f0fdf4}
.plate-item.selected{border-color:var(--success);background:#f0fdf4;box-shadow:0 0 0 3px rgba(22,163,74,.12)}
.plate-item .plate-no{font-size:17px;font-weight:700;letter-spacing:1px}
.plate-item .plate-meta{font-size:12px;color:var(--muted);margin-top:2px}
.plate-item .check-icon{font-size:20px;color:var(--success);display:none}
.plate-item.selected .check-icon{display:block}

/* success */
.success-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px 0 16px;text-align:center}
.success-wrap .big-icon{font-size:64px}
.success-wrap h2{font-size:22px;font-weight:700}
.success-wrap p{font-size:14px;color:var(--muted)}
.info-table{width:100%;border-collapse:collapse;margin-top:8px}
.info-table td{padding:9px 12px;font-size:14px;border-bottom:1px solid var(--border)}
.info-table td:first-child{color:var(--muted);width:80px}
.info-table td:last-child{font-weight:600}

/* admin */
.stats-row{display:flex;gap:10px}
.stat-card{flex:1;background:var(--card);border-radius:12px;padding:14px 12px;box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-size:28px;font-weight:800}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.stat-card.blue .num{color:var(--primary)}
.stat-card.green .num{color:var(--success)}
.stat-card.warn .num{color:var(--warn)}
.record-list{display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--border)}
.record-card.in{border-left-color:var(--primary)}
.record-card.out{border-left-color:var(--success)}
.rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rc-plate{font-size:16px;font-weight:700}
.rc-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-in{background:#dbeafe;color:#1d4ed8}
.badge-out{background:#dcfce7;color:#15803d}
.rc-info{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
.rc-time{font-size:12px;color:var(--muted);margin-top:6px}
.tab-bar{display:flex;gap:8px;background:#e2e8f0;border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:background .2s,color .2s}
.tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-row input,.filter-row select{flex:1;min-width:120px;font-size:13px;padding:9px 12px}
.action-btn{background:#f8fafc;border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#f1f5f9}
.empty-tip{text-align:center;padding:40px 0;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:8px}

/* loading */
.loading-mask{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:15px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* utils */
.mt8{margin-top:8px}.mt16{margin-top:16px}
.text-center{text-align:center}.text-muted{color:var(--muted);font-size:13px}
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* anim */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .4s ease}

</style>
  <style>
    .welcome{text-align:center;padding:28px 0 8px}
    .welcome .main-icon{font-size:56px;display:block;margin-bottom:10px}
    .welcome h2{font-size:22px;font-weight:800}
    .welcome p{font-size:14px;color:var(--muted);margin-top:4px}
    .time-display{text-align:center;font-size:13px;color:var(--muted);padding:4px 0 8px}
    .onsite-tip{display:flex;align-items:center;justify-content:space-between;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;font-size:13px;color:#1d4ed8}
    .onsite-tip strong{font-size:18px}
  </style>
</head>
<body>
<div class="topbar">
  <span class="logo">🚛</span>
  <h1>司机到离场管理</h1>
</div>

<div class="container fade-in">
  <div class="welcome">
    <span class="main-icon">🏭</span>
    <h2>欢迎来到签到系统</h2>
    <p>请选择您要进行的操作</p>
  </div>

  <div class="time-display" id="timeDisplay"></div>

  <div class="onsite-tip">
    <span>🚗 当前在场车辆</span>
    <strong id="onsiteCount">—</strong>
  </div>

  <div class="home-btn-wrap">
    <button class="home-big-btn btn-checkin" onclick="location.href='checkin.html'">
      <div class="icon">✅</div>
      <div class="info"><h2>司机签到</h2><p>到场登记 · 填写车辆信息</p></div>
      <span style="font-size:20px;margin-left:auto">›</span>
    </button>
    <button class="home-big-btn btn-checkout" onclick="location.href='checkout.html'">
      <div class="icon">🚪</div>
      <div class="info"><h2>司机签退</h2><p>离场登记 · 选择车牌确认</p></div>
      <span style="font-size:20px;margin-left:auto">›</span>
    </button>
  </div>

  <p class="text-center text-muted mt8">如有问题请联系现场管理员</p>
</div>

<script>
/**
 * api.js — Supabase 数据层
 * 部署前请将 SUPABASE_URL 和 SUPABASE_ANON_KEY 替换为你的实际值
 * 获取方式：Supabase 控制台 → Project Settings → API
 */

// ── 配置区（部署前必填）────────────────────────────────────
const SUPABASE_URL      = 'https://ytizvfczjcjgqavxuoku.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aXp2ZmN6amNqZ3Fhdnh1b2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDkwMDksImV4cCI6MjA5MTY4NTAwOX0.4vGHG67fvWYptrE0Xy_HQwHpJLNTbttgi4KRAAcMfPs';
const TABLE             = 'driver_records';
const ADMIN_PASSWORD    = '1234';                    // 管理员密码，可自行修改
// ──────────────────────────────────────────────────────────

/** 通用请求封装 */
async function sbFetch(path, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'apikey':        SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':  'application/json',
      'Prefer':        options.prefer || '',
      ...options.headers,
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/** 格式化时间 */
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} `
       + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/** 计算在场时长 */
function duration(inIso, outIso) {
  const end  = outIso ? new Date(outIso) : new Date();
  const mins = Math.floor((end - new Date(inIso)) / 60000);
  if (mins < 60) return `${mins} 分钟`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h} 小时 ${m} 分钟` : `${h} 小时`;
}

/** 公司徽标 */
const COMPANY_COLOR = { '中通':'#f97316','月祥':'#8b5cf6','自有':'#0ea5e9','货拉拉':'#ec4899' };
function companyBadge(company) {
  const c = COMPANY_COLOR[company] || '#64748b';
  return `<span class="rc-badge" style="background:${c}22;color:${c}">${company}</span>`;
}

/** ── API 方法 ─────────────────────────────────────────── */
const API = {

  /** 签到：新增记录 */
  async checkIn({ name, plate, phone, company }) {
    return sbFetch(`${TABLE}?select=*`, {
      method: 'POST',
      prefer: 'return=representation',
      body: JSON.stringify({
        name: name.trim(),
        plate: plate.trim().toUpperCase(),
        phone: phone.trim(),
        company,
      }),
    }).then(rows => rows[0]);
  },

  /** 查询当前在场（未签退）车辆 */
  async onSite() {
    return sbFetch(`${TABLE}?select=*&out_time=is.null&order=in_time.desc`);
  },

  /** 按车牌/姓名模糊搜索在场车辆 */
  async searchOnSite(keyword) {
    const kw = keyword.trim().toUpperCase();
    if (!kw) return this.onSite();
    return sbFetch(
      `${TABLE}?select=*&out_time=is.null&or=(plate.ilike.*${kw}*,name.ilike.*${kw}*)&order=in_time.desc`
    );
  },

  /** 签退：更新 out_time */
  async checkOut(id) {
    return sbFetch(`${TABLE}?id=eq.${id}&select=*`, {
      method: 'PATCH',
      prefer: 'return=representation',
      body: JSON.stringify({ out_time: new Date().toISOString() }),
    }).then(rows => rows[0]);
  },

  /** 管理后台：查询全部记录（支持筛选） */
  async all({ company = '', date = '', tab = 'all' } = {}) {
    let q = `${TABLE}?select=*&order=in_time.desc`;
    if (tab === 'onsite') q += '&out_time=is.null';
    if (tab === 'done')   q += '&out_time=not.is.null';
    if (company) q += `&company=eq.${encodeURIComponent(company)}`;
    if (date)    q += `&in_time=gte.${date}T00:00:00&in_time=lte.${date}T23:59:59`;
    return sbFetch(q);
  },

  /** 统计数据 */
  async stats() {
    const today = new Date().toISOString().slice(0, 10);
    const [all, onsite, todayList] = await Promise.all([
      sbFetch(`${TABLE}?select=id`),
      sbFetch(`${TABLE}?select=id&out_time=is.null`),
      sbFetch(`${TABLE}?select=id&in_time=gte.${today}T00:00:00`),
    ]);
    return {
      total:  all.length,
      onsite: onsite.length,
      today:  todayList.length,
    };
  },
};

</script>
<script>
  // 实时时钟
  function tick() {
    const d = new Date(), p = n => String(n).padStart(2,'0');
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('timeDisplay').textContent =
      `${d.getFullYear()}年${p(d.getMonth()+1)}月${p(d.getDate())}日 星期${days[d.getDay()]}  ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }
  tick(); setInterval(tick, 1000);

  // 在场数量
  API.onSite().then(list => {
    document.getElementById('onsiteCount').textContent = list.length;
  }).catch(() => {
    document.getElementById('onsiteCount').textContent = '—';
  });

</script>
</body>
</html>
